<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tigo Transparent Square Assets</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #f6f6f4;
        color: #151515;
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 44px;
      }
      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.1;
      }
      p {
        margin: 8px 0 0;
        color: #656565;
        font-size: 14px;
      }
      .tools {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      input, select {
        height: 36px;
        border: 1px solid #d7d7d2;
        background: #fff;
        border-radius: 8px;
        padding: 0 10px;
        color: #151515;
        font: inherit;
        font-size: 14px;
      }
      input { width: min(360px, 100%); }
      .count {
        color: #656565;
        font-size: 13px;
        white-space: nowrap;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 12px;
      }
      .card {
        background: #fff;
        border: 1px solid #e3e3df;
        border-radius: 8px;
        overflow: hidden;
      }
      .art {
        display: grid;
        place-items: center;
        aspect-ratio: 1;
        padding: 12px;
        background-color: #fff;
        background-image:
          linear-gradient(45deg, #efefec 25%, transparent 25%),
          linear-gradient(-45deg, #efefec 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #efefec 75%),
          linear-gradient(-45deg, transparent 75%, #efefec 75%);
        background-size: 18px 18px;
        background-position: 0 0, 0 9px, 9px -9px, -9px 0;
      }
      img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .meta {
        border-top: 1px solid #e3e3df;
        padding: 9px 10px 10px;
      }
      .name {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        overflow-wrap: anywhere;
      }
      .size {
        margin-top: 4px;
        color: #73736d;
        font-size: 11px;
      }
      .empty {
        display: none;
        border: 1px solid #e3e3df;
        background: #fff;
        border-radius: 8px;
        padding: 18px;
        color: #656565;
      }
      @media (max-width: 720px) {
        header { display: block; }
        .tools { margin-top: 16px; }
        input, select { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Tigo Transparent Square Assets</h1>
          <p>Centered PNG derivatives with transparent backgrounds. Originals are untouched.</p>
        </div>
        <div class="tools">
          <input id="query" type="search" placeholder="Filter by folder or filename">
          <select id="group">
            <option value="">All groups</option>
          </select>
          <span id="count" class="count"></span>
        </div>
      </header>
      <div id="empty" class="empty">No assets match this filter.</div>
      <section id="grid" class="grid" aria-label="Processed Tigo assets"></section>
    </main>
    <script>
      const grid = document.querySelector("#grid");
      const query = document.querySelector("#query");
      const group = document.querySelector("#group");
      const count = document.querySelector("#count");
      const empty = document.querySelector("#empty");
      let outputs = [];

      function groupName(asset) {
        const parts = asset.output.split("/");
        return parts.length > 2 ? parts.slice(1, -1).join("/") : "root";
      }

      function render() {
        const term = query.value.trim().toLowerCase();
        const selected = group.value;
        const filtered = outputs.filter((asset) => {
          const haystack = asset.output.toLowerCase();
          return (!selected || groupName(asset) === selected) && (!term || haystack.includes(term));
        });
        count.textContent = `${filtered.length} shown`;
        empty.style.display = filtered.length ? "none" : "block";
        grid.innerHTML = filtered.map((asset) => {
          const src = "./" + asset.output.replace(/^transparent-square\//, "");
          const label = asset.output.replace(/^transparent-square\//, "");
          const size = Array.isArray(asset.output_size) ? `${asset.output_size[0]}x${asset.output_size[1]}` : "";
          return `
            <article class="card">
              <div class="art"><img src="${src}" alt="${label}" loading="lazy"></div>
              <div class="meta">
                <p class="name">${label}</p>
                <div class="size">${size}</div>
              </div>
            </article>
          `;
        }).join("");
      }

      fetch("./manifest.json")
        .then((response) => response.json())
        .then((manifest) => {
          outputs = manifest.outputs || [];
          const groups = Array.from(new Set(outputs.map(groupName))).sort();
          group.insertAdjacentHTML("beforeend", groups.map((name) => `<option value="${name}">${name}</option>`).join(""));
          query.addEventListener("input", render);
          group.addEventListener("change", render);
          render();
        })
        .catch(() => {
          empty.textContent = "Could not load manifest.json. Serve this folder over localhost if your browser blocks file access.";
          empty.style.display = "block";
        });
    </script>
  </body>
</html>
